<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Upload from public folder</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <h1>Upload an Image on the public folder</h1>

    <div id="message"></div>

    <div class="upload-box">
      <form id="uploadForm">
        <input
          type="file"
          id="image"
          name="image"
          accept="image/*"
          required
          aria-label="Select an image to upload"
        />
        <div id="fileName" class="file-name"></div>
        <button type="submit" id="submitBtn">Upload</button>
      </form>
    </div>

    <div class="gallery">
      <div class="gallery-header">
        <h2>Uploaded Images</h2>
        <div class="gallery-controls">
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search by filename or storage type..."
            aria-label="Search images"
          />
          <select id="sort-select" class="sort-select" aria-label="Sort images">
            <option value="date">Date (Newest)</option>
            <option value="name">Name (A-Z)</option>
            <option value="size">Size (Largest)</option>
          </select>
          <button id="view-toggle" class="btn-toggle">Switch to List View</button>
        </div>
      </div>

      <div id="bulk-actions-bar" class="bulk-actions-bar">
        <label class="select-all-label">
          <input type="checkbox" id="select-all" />
          <span id="selected-count">0 selected</span>
        </label>
        <button id="delete-selected-btn" class="btn-delete-selected">Delete Selected</button>
      </div>

      <div id="image-gallery"></div>

      <div id="load-more-container" class="load-more-container">
        <button id="load-more-btn" class="btn-load-more">Load More</button>
      </div>
    </div>

    <!-- Lightbox Modal (Inspector) -->
    <div
      id="lightbox-modal"
      class="lightbox-modal"
      role="dialog"
      aria-modal="true"
      aria-label="Image preview"
    >
      <button id="lightbox-close" class="lightbox-close" aria-label="Close">&times;</button>

      <div class="lightbox-content">
        <div class="lightbox-preview">
          <button id="lightbox-prev" class="lightbox-nav lightbox-prev" aria-label="Previous image">
            &larr;
          </button>
          <img id="lightbox-image" class="lightbox-image" src="" alt="Full size image" />
          <button id="lightbox-next" class="lightbox-nav lightbox-next" aria-label="Next image">
            &rarr;
          </button>
        </div>

        <div class="lightbox-sidebar">
          <h3 class="sidebar-title">Asset Inspector</h3>

          <div class="inspector-section">
            <h4>Info</h4>
            <div class="inspector-field">
              <span class="field-label">Display Name:</span>
              <span id="inspector-displayName" class="field-value">-</span>
            </div>
            <div class="inspector-field">
              <span class="field-label">Original Name:</span>
              <span id="inspector-originalName" class="field-value">-</span>
            </div>
            <div class="inspector-field">
              <span class="field-label">Uploaded:</span>
              <span id="inspector-uploadDate" class="field-value">-</span>
            </div>
          </div>

          <div class="inspector-section">
            <h4>Technical</h4>
            <div class="inspector-field">
              <span class="field-label">Dimensions:</span>
              <span id="inspector-dimensions" class="field-value">-</span>
            </div>
            <div class="inspector-field">
              <span class="field-label">File Size:</span>
              <span id="inspector-size" class="field-value">-</span>
            </div>
            <div class="inspector-field">
              <span class="field-label">Type:</span>
              <span id="inspector-fileType" class="field-value">-</span>
            </div>
          </div>

          <div class="inspector-section">
            <h4>Colors</h4>
            <div id="inspector-colors" class="color-swatches"></div>
          </div>

          <div class="inspector-section">
            <h4>Tags</h4>
            <div id="inspector-tags" class="tag-chips"></div>
          </div>

          <div class="inspector-actions">
            <button id="inspector-download" class="btn-inspector">Download</button>
            <button id="inspector-copy" class="btn-inspector">Copy Link</button>
            <button id="inspector-rename" class="btn-inspector">Rename</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Tag Filter Dropdown (hidden by default) -->
    <div id="tag-filter-dropdown" class="tag-filter-dropdown hidden">
      <div class="tag-filter-header">
        <span>Filter by tag</span>
        <button id="tag-filter-clear" class="btn-clear">Clear</button>
      </div>
      <div id="tag-filter-list" class="tag-filter-list"></div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
